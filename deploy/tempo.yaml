apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: wattopus
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: wattopus
  labels: { app: tempo }
spec:
  replicas: 1
  selector:
    matchLabels: { app: tempo }
  template:
    metadata:
      labels: { app: tempo }
    spec:
      containers:
        - name: tempo
          image: grafana/tempo:2.5.0
          args: [-config.file=/etc/tempo/tempo.yaml]
          ports:
            - { containerPort: 3200 }
            - { containerPort: 4317 }
          volumeMounts:
            - { name: config, mountPath: /etc/tempo }
            - { name: data, mountPath: /var/tempo }
      volumes:
        - name: config
          configMap: { name: tempo-config }
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: wattopus
spec:
  selector: { app: tempo }
  ports:
    - { name: http, port: 3200 }
    - { name: otlp-grpc, port: 4317 }
