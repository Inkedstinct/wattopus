apiVersion: v1
kind: ServiceAccount
metadata:
  name: operator
  namespace: wattopus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wattopus-operator
rules:
  - apiGroups: [apps]
    resources: [deployments, deployments/scale]
    verbs: [get, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wattopus-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: wattopus-operator
subjects:
  - kind: ServiceAccount
    name: operator
    namespace: wattopus
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: operator
  namespace: wattopus
  labels: { app: operator }
spec:
  replicas: 1
  selector:
    matchLabels: { app: operator }
  template:
    metadata:
      labels: { app: operator }
    spec:
      serviceAccountName: operator
      containers:
        - name: operator
          image: inkedstinct/operator:0.2.0
          imagePullPolicy: IfNotPresent
          env:
            - { name: GREYCAT_URL, value: http://greycat:8080 }
            - { name: CPU_LIMIT_PER_POD, value: "0.05" }
            - { name: OTEL_SERVICE_NAME, value: operator }
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT, value: http://otel-collector:4318 }
          ports: [{ containerPort: 8080 }]
---
apiVersion: v1
kind: Service
metadata:
  name: operator
  namespace: wattopus
spec:
  selector: { app: operator }
  ports: [{ port: 8080 }]
