apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: wattopus
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    exporters:
      otlp/tempo:
        endpoint: tempo:4317
        tls: { insecure: true }
      otlphttp/attributor:
        traces_endpoint: http://attributor:4318/v1/traces
        encoding: json
        # the attributor reads the body as plain text; default gzip = 400
        compression: none
        tls: { insecure: true }
        
      debug:
        verbosity: basic
        sampling_initial: 1
        sampling_thereafter: 1000
    service:
      pipelines:
        traces:
          receivers: [otlp]
          exporters: [otlp/tempo, otlphttp/attributor]
        metrics:
          receivers: [otlp]
          exporters: [debug]
        logs:
          receivers: [otlp]
          exporters: [debug]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: wattopus
  labels: { app: otel-collector }
spec:
  replicas: 1
  selector:
    matchLabels: { app: otel-collector }
  template:
    metadata:
      labels: { app: otel-collector }
    spec:
      containers:
        - name: collector
          image: otel/opentelemetry-collector-contrib:0.106.1
          args: [--config=/etc/otel/config.yaml]
          ports:
            - { containerPort: 4317 }
            - { containerPort: 4318 }
          volumeMounts:
            - { name: config, mountPath: /etc/otel }
      volumes:
        - name: config
          configMap: { name: otel-collector-config }
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: wattopus
spec:
  selector: { app: otel-collector }
  ports:
    - { name: otlp-grpc, port: 4317 }
    - { name: otlp-http, port: 4318 }
