# G5K profile: Kepler (make deploy-kepler) is the meter, mockpower dropped.
# Kepler labels are pod_namespace/pod_name; attributor+feeder read namespace/pod,
# and the pods scrape job attaches its own namespace/pod (the kepler DS pod) —
# label_replace overwrites them with the real subject, after saving the exporting
# kepler pod as meter_pod (don't lose which meter produced the value).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata: { name: attributor, namespace: wattopus }
      spec:
        template:
          spec:
            containers:
              - name: attributor
                env:
                  - name: POWER_QUERY
                    value: 'sum by (namespace, pod, meter_pod) (label_replace(label_replace(label_replace(kepler_pod_cpu_watts, "meter_pod", "$1", "pod", "(.+)"), "namespace", "$1", "pod_namespace", "(.+)"), "pod", "$1", "pod_name", "(.+)"))'
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata: { name: feeder, namespace: wattopus }
      spec:
        template:
          spec:
            containers:
              - name: feeder
                env:
                  - name: POWER_QUERY
                    value: 'sum by (namespace, pod, meter_pod) (label_replace(label_replace(label_replace(kepler_pod_cpu_watts, "meter_pod", "$1", "pod", "(.+)"), "namespace", "$1", "pod_namespace", "(.+)"), "pod", "$1", "pod_name", "(.+)"))'
  - patch: |-
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata: { name: mockpower, namespace: wattopus }
