# OpenTelemetry Demo as the reference third-party app.
opentelemetry-collector:
  enabled: false
jaeger:
  enabled: false
prometheus:
  enabled: false
grafana:
  enabled: false
opensearch:
  enabled: false

default:
  envOverrides:
    - name: OTEL_COLLECTOR_NAME
      value: otel-collector.wattopus
